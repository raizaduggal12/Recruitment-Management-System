<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Dashboard — Placement Portal</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="static/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="static/js/config.js"></script>
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <a class="navbar-brand" href="dashboard.html">
      Placement <span>Portal</span>
    </a>
    <div class="navbar-right">
      <span class="navbar-user" id="navUserName">Loading...</span>
      <button class="btn btn-outline btn-sm" id="logoutBtn">Logout</button>
    </div>
  </nav>

  <div class="page-container">
    <!-- Page header -->
    <div class="page-header">
      <h2>Student Dashboard</h2>
      <p>Browse open placements and apply to companies you're eligible for</p>
    </div>

    <!-- Alert messages -->
    <div id="msg" class="alert"></div>

    <!-- Student Profile Card -->
    <div class="profile-card" id="profileCard">
      <div class="profile-avatar" id="profileAvatar">?</div>
      <div class="profile-info">
        <h3 id="profileName">Loading...</h3>
        <div class="profile-meta" id="profileMeta"></div>
      </div>
    </div>

    <!-- Companies Section -->
    <p class="section-title">Open Placements</p>
    <div id="companiesContainer">
      <p class="loading-text">Loading companies...</p>
    </div>
  </div>

  <script src="static/js/dashboard.js"></script>
</body>
</html>
